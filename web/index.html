<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tactical FB">
  <meta name="theme-color" content="#11151c">
  <title>Tactical Football — Slant vs Cover 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div id="app">

    <!-- HUD -->
    <header id="hud">
      <div class="hud-cell"><span class="hud-label">SCORE</span><span id="hud-score">0</span></div>
      <div class="hud-cell"><span class="hud-label">DOWN</span><span id="hud-down">1st &amp; 10</span></div>
      <div class="hud-cell"><span class="hud-label">BALL ON</span><span id="hud-spot">−25</span></div>
      <div class="hud-cell"><span class="hud-label">DRIVE</span><span id="hud-drive">0 yds</span></div>
    </header>

    <!-- Field -->
    <div id="field-wrap">
      <button id="mute-btn" aria-label="Toggle sound">🔊</button>
      <div id="field">
        <div id="endzone"></div>
        <svg id="routes" viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs>
            <marker id="arrow" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
              <path d="M0,0 L4,2 L0,4 Z" fill="currentColor"></path>
            </marker>
            <marker id="arrow-faint" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
              <path d="M0,0 L4,2 L0,4 Z" fill="rgba(255,255,255,0.35)"></path>
            </marker>
          </defs>
        </svg>
        <!-- player chips + ball injected by game.js -->
        <div id="ball"></div>
        <div id="flash"></div>
      </div>
    </div>

    <!-- Controls / breakdown -->
    <section id="panel">

      <!-- PRE-SNAP -->
      <div id="presnap" class="panel-stage">
        <div id="read-banner">
          <span id="read-text"></span>
          <button id="hint-btn" class="ghost-btn" aria-pressed="false">Coach hint</button>
        </div>
        <div id="hint-box" class="hint hidden"></div>

        <div class="route-label">Choose a play</div>
        <div id="play-picker"></div>
        <div class="route-label hidden" id="target-label">Target a receiver</div>
        <div id="target-picker" class="hidden"></div>

        <button id="snap-btn" disabled>SNAP</button>
      </div>

      <!-- ANIMATING -->
      <div id="animating" class="panel-stage hidden">
        <div id="tick-caption">Snap…</div>
      </div>

      <!-- POST-PLAY -->
      <div id="postplay" class="panel-stage hidden">
        <div id="result-line">Completion +8</div>
        <div id="drive-banner" class="hidden"></div>
        <div id="breakdown"></div>
        <button id="next-btn">Next play ›</button>
      </div>

      <!-- OPPONENT POSSESSION -->
      <div id="cpu" class="panel-stage hidden">
        <div id="cpu-title">Opponent possession</div>
        <div id="cpu-result">Touchdown</div>
        <div id="cpu-tally">You 0 · Opponent 0</div>
        <button id="cpu-continue">Continue ›</button>
      </div>

      <!-- GAME OVER -->
      <div id="gameover" class="panel-stage hidden">
        <div id="go-title">Final</div>
        <div id="go-score">0</div>
        <div id="go-sub">0 touchdowns in 5 drives</div>
        <div id="go-grade">F</div>
        <div id="go-best" class="go-best">Best 0</div>
        <button id="new-game-btn">New game ›</button>
      </div>
    </section>
  </div>

  <!-- player stat card popover -->
  <div id="card-layer" class="hidden">
    <div id="card"></div>
  </div>

  <script src="zzfx.js"></script>
  <script src="sound.js"></script>
  <script src="sim.js"></script>
  <script src="game.js"></script>
  <script>
    // Register the service worker for offline / installable PWA support.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (err) {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
